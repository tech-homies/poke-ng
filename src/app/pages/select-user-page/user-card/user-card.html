<mat-card appearance="outlined">
  <mat-card-header>
    <img mat-card-avatar [src]="user().avatarUrl" [alt]="'Photo of ' + user().name">
    <mat-card-title>{{ user().name }}</mat-card-title>
    <mat-card-subtitle>ID: {{ user().id }}</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image class="user-avatar" [src]="user().avatarUrl" [alt]="'Photo of ' + user().name">
  <mat-card-content>
    <p>
      {{ user().description }}
    </p>
  </mat-card-content>
  <mat-card-actions class="actions">
    <button matButton="filled" type="button" (click)="selectTrainer()">Select</button>
  </mat-card-actions>
</mat-card>
