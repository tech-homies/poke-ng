<h1>Quel dresseur es-tu ?</h1>
@if (users.isLoading()) {
  <mat-spinner></mat-spinner>
} @else {
  <div class="users">
    @for (user of users.value(); track user.id) {
      <app-user-card [user]="user"></app-user-card>
    }
  </div>
  <div>
    <button mat-stroked-button type="button" (click)="addUser()">Add UserCard</button>
  </div>
}
