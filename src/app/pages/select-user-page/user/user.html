<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <img mat-card-avatar [src]="user().avatarUrl" [alt]="'Photo of ' + user().name">
    <mat-card-title>{{ user().name }}</mat-card-title>
    <mat-card-subtitle>{{ user().id }}</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image [src]="user().avatarUrl" [alt]="'Photo of ' + user().name">
  <mat-card-content>
    <p>
      The Shiba Inu is the smallest of the six original and distinct spitz breeds of dog from Japan.
      A small, agile dog that copes very well with mountainous terrain, the Shiba Inu was originally
      bred for hunting.
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton type="button" (click)="selectTrainer()">Select</button>
  </mat-card-actions>
</mat-card>
